<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="robots" content="index, follow">
  <title>Vigor Max</title>
  <link rel="shortcut icon" href="data:">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">

  <!-- Preload do player VTurb -->
  <link rel="dns-prefetch" href="https://cdn.converteai.net">
  <link rel="dns-prefetch" href="https://scripts.converteai.net">
  <link rel="dns-prefetch" href="https://images.converteai.net">
  <link rel="dns-prefetch" href="https://api.vturb.com.br">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #f0f0f0;
      font-family: 'Montserrat', sans-serif;
      line-height: 1;
      overflow-x: hidden;
    }

    /* ── Video Section ── */
    .video-section {
      padding: 6vh 20vw 3vh 20vw;
    }

    .video-wrapper {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Placeholder enquanto não tem o player */
    .video-placeholder {
      position: relative;
      width: 100%;
      padding-top: 160%; /* 9:16 vertical */
      background: #000;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-placeholder-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #555;
      font-size: 14px;
      text-align: center;
      font-weight: 500;
    }

    /* ── Sound Reminder ── */
    .sound-section {
      padding: 2vh 24vw 7vh 24vw;
    }

    .sound-reminder {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .sound-reminder i {
      color: #000;
      font-size: 32px;
    }

    .sound-reminder p {
      font-size: 0.99vw;
      color: #000;
      font-weight: 400;
      line-height: 1.1;
    }

    /* ── Copyright ── */
    .copyright-section {
      padding: 0.01vh 20vw 3vh 20vw;
    }

    .copyright-section p {
      font-size: 0.99vw;
      text-align: center;
      color: #000;
      line-height: 1.4;
      font-weight: 400;
      padding: 2vh 0;
    }

    /* ── Responsive ── */
    @media (max-width: 1200px) {
      .video-section { padding: 4.5vh 15vw 2.25vh 15vw; }
      .sound-section { padding: 1.5vh 18vw 5.25vh 18vw; }
      .sound-reminder i { font-size: 24px; }
      .sound-reminder p { font-size: 1.5vw; }
      .copyright-section { padding: 0.001vh 15vw 2.25vh 15vw; }
      .copyright-section p { font-size: 1.5vw; }
    }

    @media (max-width: 640px) {
      .video-section { padding: 4.5vh 1.5vw 1.5vh 1.5vw; }
      .sound-section { padding: 4.5vh 4.5vw 1.5vh 4.5vw; }
      .sound-reminder { margin: -2vh 0 2.5vh 0; }
      .sound-reminder i { font-size: 24px; }
      .sound-reminder p { font-size: 4vw; text-align: center; }
      .copyright-section { padding: 1.5vh 1.5vw 1.5vh 1.5vw; }
      .copyright-section p { font-size: 4vw; }
    }
  </style>
</head>
<body>

  <!-- ═══════ VIDEO ═══════ -->
  <div class="video-section">
    <div class="video-wrapper">
      <!-- SUBSTITUIR pelo embed do VTurb quando tiver o player ID -->
      <div class="video-placeholder">
        <span class="video-placeholder-text">VTurb Player<br><br>Cole o script do player aqui</span>
      </div>
    </div>
  </div>

  <!-- ═══════ SOUND REMINDER ═══════ -->
  <div class="sound-section">
    <div class="sound-reminder">
      <i class="bi bi-volume-up-fill"></i>
      <p>Stellen Sie sicher, dass Ihr Ton eingeschaltet ist.</p>
    </div>
  </div>

  <!-- ═══════ COPYRIGHT ═══════ -->
  <div class="copyright-section">
    <p>Copyright 2025 &reg;<br>All Rights Reserved</p>
  </div>

  <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>
</body>
</html>
